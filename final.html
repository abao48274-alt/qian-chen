<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
 <meta name="theme-color" content="#a78bfa">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <link rel="manifest" href="manifest.json">
 <title>🎬 千尘AI动漫工厂 Ultimate</title>
 <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
 min-height: 100vh;
 padding: 12px;
 color: #e2e8f0;
 }
 .app-container { max-width: 1600px; margin: 0 auto; }
 .dashboard {
 display: grid;
 grid-template-columns: 320px 1fr 340px;
 gap: 16px;
 margin-bottom: 16px;
 }
 @media (max-width: 1200px) { .dashboard { grid-template-columns: 1fr; } }
 
 .card {
 background: rgba(30, 30, 46, 0.9);
 backdrop-filter: blur(12px);
 border-radius: 24px;
 overflow: hidden;
 border: 1px solid rgba(255,255,255,0.1);
 margin-bottom: 12px;
 }
 .card-header {
 padding: 12px 16px;
 background: rgba(0,0,0,0.3);
 display: flex;
 justify-content: space-between;
 align-items: center;
 border-bottom: 1px solid rgba(255,255,255,0.1);
 }
 .card-header h3 { font-size: 0.85rem; color: white; display: flex; align-items: center; gap: 6px; }
 
 /* Live Preview Toggle */
 .live-preview-toggle {
 display: flex;
 align-items: center;
 gap: 8px;
 background: rgba(0,0,0,0.3);
 padding: 4px 12px;
 border-radius: 40px;
 }
 .toggle-switch {
 width: 40px;
 height: 20px;
 background: rgba(255,255,255,0.2);
 border-radius: 20px;
 cursor: pointer;
 transition: 0.3s;
 position: relative;
 }
 .toggle-switch.active { background: #a78bfa; }
 .toggle-switch::after {
 content: '';
 width: 16px;
 height: 16px;
 background: white;
 border-radius: 50%;
 position: absolute;
 top: 2px;
 left: 2px;
 transition: 0.3s;
 }
 .toggle-switch.active::after { left: 22px; }
 .status-badge {
 font-size: 0.6rem;
 padding: 2px 8px;
 border-radius: 20px;
 background: rgba(16,185,129,0.2);
 color: #10b981;
 }
 .status-badge.off { background: rgba(239,68,68,0.2); color: #ef4444; }
 
 /* 9 Grid Storyboard */
 .storyboard-container { padding: 16px; }
 .storyboard-grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 12px;
 margin-bottom: 16px;
 }
 .storyboard-cell {
 aspect-ratio: 16 / 9;
 background: rgba(0,0,0,0.5);
 border-radius: 12px;
 overflow: hidden;
 position: relative;
 cursor: pointer;
 border: 2px solid transparent;
 transition: 0.2s;
 }
 .storyboard-cell.active { border-color: #a78bfa; box-shadow: 0 0 20px rgba(167,139,250,0.5); }
 .storyboard-preview { width: 100%; height: 100%; object-fit: cover; }
 .storyboard-placeholder {
 width: 100%; height: 100%;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 background: linear-gradient(135deg, #2d2d44, #1a1a2e);
 color: #a78bfa;
 font-size: 0.7rem;
 }
 .storyboard-number {
 position: absolute;
 top: 6px; left: 8px;
 background: rgba(0,0,0,0.6);
 color: white;
 font-size: 0.7rem;
 padding: 2px 6px;
 border-radius: 12px;
 z-index: 2;
 }
 .storyboard-label {
 position: absolute;
 bottom: 6px; left: 0; right: 0;
 text-align: center;
 background: rgba(0,0,0,0.6);
 color: white;
 font-size: 0.6rem;
 padding: 2px;
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
 }
 
 /* 10 Themes */
 .theme-grid-10 {
 display: grid;
 grid-template-columns: repeat(5, 1fr);
 gap: 8px;
 margin-bottom: 12px;
 }
 .theme-card {
 background: rgba(255,255,255,0.1);
 border-radius: 40px;
 padding: 8px 4px;
 text-align: center;
 cursor: pointer;
 font-size: 0.7rem;
 border: 1px solid transparent;
 transition: 0.2s;
 }
 .theme-card.active { background: #a78bfa; border-color: white; }
 .theme-card:hover { background: rgba(167,139,250,0.3); transform: translateY(-2px); }
 .theme-emoji { font-size: 1.2rem; display: block; }
 
 /* Preview Area */
 .main-preview { padding: 16px; }
 .main-preview-frame {
 background: white;
 border-radius: 20px;
 overflow: hidden;
 min-height: 400px;
 transition: 0.2s;
 }
 iframe { width: 100%; height: 450px; border: none; }
 
 /* Editor */
 .code-editor-container { position: relative; }
 textarea {
 width: 100%;
 height: 120px;
 background: #0a0a0f;
 color: #e2e8f0;
 font-family: monospace;
 padding: 12px;
 border: none;
 outline: none;
 font-size: 0.7rem;
 resize: vertical;
 }
 .live-indicator {
 position: absolute;
 bottom: 8px; right: 12px;
 font-size: 0.6rem;
 color: #10b981;
 background: rgba(16,185,129,0.2);
 padding: 2px 8px;
 border-radius: 20px;
 pointer-events: none;
 }
 
 .tool-btn {
 background: rgba(255,255,255,0.1);
 border: none;
 padding: 6px 12px;
 border-radius: 40px;
 color: white;
 font-size: 0.7rem;
 cursor: pointer;
 transition: 0.2s;
 }
 .tool-btn:hover { background: rgba(167,139,250,0.5); }
 .tool-btn.primary { background: #a78bfa; }
 .progress-bar {
 height: 2px;
 background: linear-gradient(90deg, #a78bfa, #7c3aed);
 width: 0%;
 transition: width 0.3s;
 margin-top: 8px;
 border-radius: 2px;
 }
 
 /* Chat Area */
 .chat-area { height: 320px; display: flex; flex-direction: column; }
 .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
 .message {
 padding: 8px 12px;
 border-radius: 16px;
 max-width: 85%;
 font-size: 0.75rem;
 line-height: 1.4;
 animation: fadeIn 0.2s;
 }
 @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
 .message.user { background: #a78bfa; color: white; align-self: flex-end; }
 .message.assistant { background: rgba(255,255,255,0.1); color: #e2e8f0; align-self: flex-start; }
 .message pre {
 background: rgba(0,0,0,0.3);
 padding: 8px;
 border-radius: 8px;
 overflow-x: auto;
 font-size: 0.65rem;
 margin-top: 6px;
 }
 .api-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
 .api-btn {
 background: rgba(255,255,255,0.1);
 border: none;
 padding: 4px 10px;
 border-radius: 20px;
 font-size: 0.65rem;
 cursor: pointer;
 }
 .api-btn.active { background: #a78bfa; }
 
 /* Quick Materials */
 .quick-materials {
 padding: 12px;
 display: grid;
 grid-template-columns: repeat(4, 1fr);
 gap: 8px;
 }
 
 /* Responsive */
 @media (max-width: 768px) {
 .theme-grid-10 { grid-template-columns: repeat(3, 1fr); }
 }
 </style>
</head>
<body>
<div class="app-container">
 <div class="dashboard">
 <!-- Left: OpenClaw AI Chat + API Config -->
 <div class="card">
 <div class="card-header">
 <h3>🤖 OpenClaw · 分镜助手</h3>
 <span id="apiStatus" style="font-size:0.6rem;">⚡ 已连接</span>
 </div>
 <div class="chat-area">
 <div class="messages" id="messages">
 <div class="message assistant">
 ✨ 欢迎！我是 OpenClaw 分镜助手<br>
 🎬 支持：10大主题 | 9宫格分镜 | 实时预览 | AI生图<br>
 💡 试试说："生成赛博朋克风格的分镜" 或 "帮我设计古风角色"
 </div>
 </div>
 <div style="padding:12px; display:flex; gap:8px; border-top:1px solid rgba(255,255,255,0.1);">
 <input type="text" id="chatInput" class="tool-btn" style="flex:1; background:rgba(255,255,255,0.1);" placeholder="输入你的需求...">
 <button class="tool-btn primary" id="sendBtn">发送</button>
 </div>
 </div>
 <div class="card-header"><h3>🔌 生图API</h3></div>
 <div style="padding:12px;">
 <div class="api-selector" id="apiSelector">
 <button class="api-btn active" data-api="pollinations">🌐 Pollinations (免费)</button>
 <button class="api-btn" data-api="custom">⚙️ 自定义API</button>
 </div>
 <div id="customApiPanel" style="display:none;">
 <input type="text" id="customApiUrl" class="tool-btn" style="width:100%; margin-bottom:6px;" placeholder="API地址">
 <input type="password" id="customApiKey" class="tool-btn" style="width:100%;" placeholder="API Key (可选)">
 </div>
 </div>
 </div>
 
 <!-- Center: 9-Grid Storyboard -->
 <div class="card">
 <div class="card-header">
 <h3>🎬 9格分镜预览 · 关键环节</h3>
 <div style="display: flex; gap: 6px;">
 <button class="tool-btn" id="generateBtn">🎨 一键生成9格</button>
 <button class="tool-btn" id="exportBtn">📦 导出全部</button>
 <button class="tool-btn" id="clearBtn">🗑️ 清空</button>
 </div>
 </div>
 <div class="storyboard-container">
 <div class="storyboard-grid" id="storyboardGrid"></div>
 
 <!-- 10 Theme Selector -->
 <div class="theme-grid-10" id="themeGrid">
 <div class="theme-card" data-theme="anime"><span class="theme-emoji">🌸</span><span>日系动漫</span></div>
 <div class="theme-card" data-theme="cyberpunk"><span class="theme-emoji">🤖</span><span>赛博朋克</span></div>
 <div class="theme-card" data-theme="fantasy"><span class="theme-emoji">🐉</span><span>幻想奇幻</span></div>
 <div class="theme-card" data-theme="slice_of_life"><span class="theme-emoji">☕</span><span>日常治愈</span></div>
 <div class="theme-card" data-theme="action"><span class="theme-emoji">⚡</span><span>热血战斗</span></div>
 <div class="theme-card" data-theme="dark"><span class="theme-emoji">🌙</span><span>暗黑哥特</span></div>
 <div class="theme-card" data-theme="traditional"><span class="theme-emoji">🏯</span><span>古风传统</span></div>
 <div class="theme-card" data-theme="xianxia"><span class="theme-emoji">⚔️</span><span>仙侠修真</span></div>
 <div class="theme-card" data-theme="realistic"><span class="theme-emoji">📸</span><span>真人写实</span></div>
 <div class="theme-card" data-theme="watercolor"><span class="theme-emoji">🎨</span><span>水墨国风</span></div>
 </div>
 <div id="progressBar" class="progress-bar"></div>
 </div>
 </div>
 
 <!-- Right: Live Preview + Editor -->
 <div class="card">
 <div class="card-header">
 <h3>📷 实时预览</h3>
 <div class="live-preview-toggle">
 <span style="font-size:0.7rem;">实时预览</span>
 <div id="liveToggle" class="toggle-switch active"></div>
 <span id="liveStatus" class="status-badge">● 实时</span>
 </div>
 </div>
 <div class="main-preview">
 <div class="main-preview-frame" id="previewWrapper">
 <iframe id="previewFrame" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-forms"></iframe>
 </div>
 </div>
 <div class="card-header"><h3>📝 代码编辑器</h3></div>
 <div class="code-editor-container">
 <textarea id="codeEditor" placeholder="编辑 HTML/CSS 代码，实时预览效果..."></textarea>
 <div class="live-indicator" id="liveIndicator">⚡ 实时模式已开启</div>
 </div>
 <div class="card-header"><h3>🎨 快速素材</h3></div>
 <div class="quick-materials" id="quickMaterials">
 <button class="tool-btn" data-material="dialog">💬 对话框</button>
 <button class="tool-btn" data-material="character">👤 角色卡</button>
 <button class="tool-btn" data-material="bg">🖼️ 背景</button>
 <button class="tool-btn" data-material="effect">✨ 特效</button>
 </div>
 </div>
 </div>
</div>

<script>
// ========== 10 Theme Styles ==========
const themeStyles = {
 anime: { name: '日系动漫', prompt: 'anime style, vibrant colors, clean lines, Japanese animation, high quality, masterpiece' },
 cyberpunk: { name: '赛博朋克', prompt: 'cyberpunk style, neon lights, futuristic city, purple and cyan, dark atmosphere, high tech' },
 fantasy: { name: '幻想奇幻', prompt: 'fantasy art style, magical, ethereal, mystical creatures, soft glowing light, epic' },
 slice_of_life: { name: '日常治愈', prompt: 'slice of life, gentle colors, warm atmosphere, soft lighting, cozy feeling' },
 action: { name: '热血战斗', prompt: 'action scene, dynamic, dramatic lighting, intense, battle energy, epic, explosive' },
 dark: { name: '暗黑哥特', prompt: 'dark gothic style, mysterious, dramatic shadows, haunting beauty, Victorian, eerie' },
 traditional: { name: '古风传统', prompt: 'traditional Chinese style, ink wash painting, elegant, classical beauty, silk and jade, ancient China aesthetics, hanfu' },
 xianxia: { name: '仙侠修真', prompt: 'xianxia style, immortal cultivation, floating clouds, celestial mountains, flowing robes, sword and magic, ethereal beauty, daoist' },
 realistic: { name: '真人写实', prompt: 'photorealistic style, real human, detailed skin texture, natural lighting, hyper-realistic, professional photography' },
 watercolor: { name: '水墨国风', prompt: 'watercolor painting style, Chinese ink art, brush strokes, poetic, misty mountains, traditional landscape, zen' }
};

// 9 Default Scene Prompts
const defaultScenePrompts = [
 "主角登场，特写镜头，眼神坚定，英姿飒爽",
 "场景建立，广角镜头，壮丽世界，宏大场景",
 "关键对话，双人镜头，情感交流，眼神交汇",
 "战斗场面，动态镜头，特效爆发，热血沸腾",
 "转折时刻，悬念镜头，光影对比，紧张气氛",
 "情感高潮，近景镜头，动人瞬间，泪目时刻",
 "友情羁绊，并肩镜头，温暖氛围，夕阳背景",
 "反派亮相，仰视镜头，压迫感强，霸气侧漏",
 "结局画面，全景镜头，希望之光，圆满收尾"
];

let storyboardFrames = [];
let selectedIndex = 0;
let currentTheme = 'anime';
let currentApi = 'pollinations';
let liveEnabled = true;
let updateTimer = null;
let isGenerating = false;
let apiConfig = { custom: { url: '', key: '' } };

// ========== Initialize Storyboard ==========
function initStoryboard() {
 for (let i = 0; i < 9; i++) {
 storyboardFrames.push({
 id: i,
 prompt: defaultScenePrompts[i],
 imageUrl: null,
 code: `<div style="text-align:center; padding:40px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:20px; color:white;">
 <div style="font-size:48px; margin-bottom:12px;">🎬</div>
 <p style="font-size:14px;">${defaultScenePrompts[i]}</p>
 <button style="background:white; border:none; padding:8px 20px; border-radius:40px; margin-top:16px; cursor:pointer; color:#764ba2;">查看详情</button>
 </div>`,
 loading: false
 });
 }
 renderStoryboardGrid();
 selectFrame(0);
}

function renderStoryboardGrid() {
 const grid = document.getElementById('storyboardGrid');
 if (!grid) return;
 grid.innerHTML = storyboardFrames.map((frame, i) => `
 <div class="storyboard-cell ${selectedIndex === i ? 'active' : ''}" onclick="selectFrame(${i})">
 <div class="storyboard-number">${i+1}</div>
 ${frame.imageUrl ? 
 `<img src="${frame.imageUrl}" class="storyboard-preview" alt="分镜${i+1}" onerror="this.src=''">` : 
 `<div class="storyboard-placeholder">
 <div style="font-size:24px;">🎬</div>
 <div style="font-size:10px; margin-top:4px;">分镜${i+1}</div>
 </div>`
 }
 <div class="storyboard-label">${frame.prompt.substring(0, 18)}${frame.prompt.length > 18 ? '...' : ''}</div>
 </div>
 `).join('');
}

window.selectFrame = (idx) => {
 selectedIndex = idx;
 renderStoryboardGrid();
 const frameCode = storyboardFrames[idx].code;
 document.getElementById('codeEditor').value = frameCode;
 updatePreview(frameCode);
};

// ========== Live Preview Core ==========
function updatePreview(code) {
 const iframe = document.getElementById('previewFrame');
 const doc = `<!DOCTYPE html>
 <html>
 <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
 <style>
 *{margin:0;padding:0;box-sizing:border-box;}
 body{background:linear-gradient(135deg,#f5f7fa,#e9eef5);min-height:450px;display:flex;align-items:center;justify-content:center;padding:20px;font-family:system-ui;}
 .preview-content{max-width:100%;transition:all 0.2s;animation:fadeIn 0.2s ease;}
 @keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
 button{cursor:pointer;transition:transform 0.2s;}
 button:hover{transform:scale(1.02);}
 </style>
 </head>
 <body><div class="preview-content">${code || '<div style="padding:40px; text-align:center; color:#666;">✨ 编辑代码，实时预览 ✨</div>'}</div></body>
 </html>`;
 iframe.srcdoc = doc;
 
 // Visual feedback
 const wrapper = document.getElementById('previewWrapper');
 if (wrapper && liveEnabled) {
 wrapper.style.transition = 'box-shadow 0.2s';
 wrapper.style.boxShadow = '0 0 0 2px #a78bfa';
 setTimeout(() => wrapper.style.boxShadow = '', 200);
 }
}

function setupLivePreview() {
 const editor = document.getElementById('codeEditor');
 editor.addEventListener('input', (e) => {
 const newCode = e.target.value;
 if (storyboardFrames[selectedIndex]) {
 storyboardFrames[selectedIndex].code = newCode;
 }
 if (liveEnabled) {
 if (updateTimer) clearTimeout(updateTimer);
 updateTimer = setTimeout(() => {
 updatePreview(newCode);
 const indicator = document.getElementById('liveIndicator');
 indicator.innerHTML = '⚡ 已实时更新';
 setTimeout(() => indicator.innerHTML = '⚡ 实时模式已开启', 1500);
 }, 100);
 }
 });
}

function toggleLiveMode() {
 liveEnabled = !liveEnabled;
 const toggle = document.getElementById('liveToggle');
 const status = document.getElementById('liveStatus');
 const indicator = document.getElementById('liveIndicator');
 
 if (liveEnabled) {
 toggle.classList.add('active');
 status.innerHTML = '● 实时';
 status.className = 'status-badge';
 indicator.innerHTML = '⚡ 实时模式已开启';
 updatePreview(document.getElementById('codeEditor').value);
 } else {
 toggle.classList.remove('active');
 status.innerHTML = '○ 手动';
 status.className = 'status-badge off';
 indicator.innerHTML = '⏸️ 手动模式';
 }
}

// ========== AI Image Generation ==========
async function generateFrameImage(frame, prompt, themeKey) {
 const theme = themeStyles[themeKey] || themeStyles.anime;
 const fullPrompt = `${prompt}, ${theme.prompt}, anime style, high quality, masterpiece, detailed, cinematic lighting`;
 
 try {
 let imageUrl = null;
 if (currentApi === 'pollinations') {
 imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(fullPrompt)}?width=512&height=512&nologo=true`;
 // Preload test
 await new Promise((resolve, reject) => {
 const img = new Image();
 img.onload = resolve;
 img.onerror = reject;
 img.src = imageUrl;
 setTimeout(resolve, 2000);
 });
 } else if (currentApi === 'custom' && apiConfig.custom.url) {
 const response = await fetch(apiConfig.custom.url, {
 method: 'POST',
 headers: {
 'Content-Type': 'application/json',
 ...(apiConfig.custom.key ? { 'Authorization': `Bearer ${apiConfig.custom.key}` } : {})
 },
 body: JSON.stringify({ prompt: fullPrompt })
 });
 const data = await response.json();
 imageUrl = data.image_url || data.output?.[0] || data.url;
 }
 
 if (imageUrl) {
 frame.imageUrl = imageUrl;
 frame.code = `<div style="text-align: center; padding: 20px;">
 <img src="${imageUrl}" style="max-width: 100%; border-radius: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);">
 <p style="margin-top: 12px; font-size: 14px; color: #333;">🎬 ${frame.prompt}</p>
 <p style="font-size: 12px; color: #666; margin-top: 4px;">风格: ${theme.name}</p>
 </div>`;
 }
 } catch (error) {
 console.error('Generation failed:', error);
 frame.imageUrl = null;
 }
 
 frame.loading = false;
 renderStoryboardGrid();
 if (selectedIndex === frame.id) {
 document.getElementById('codeEditor').value = frame.code;
 updatePreview(frame.code);
 }
 return frame;
}

async function generateAllFrames() {
 if (isGenerating) {
 addMessageToChat('⏳ 正在生成中，请稍候...', false);
 return;
 }
 isGenerating = true;
 const progressBar = document.getElementById('progressBar');
 addMessageToChat(`🎬 开始生成9格分镜，主题: ${themeStyles[currentTheme].name}...`, false);
 
 for (let i = 0; i < storyboardFrames.length; i++) {
 const frame = storyboardFrames[i];
 frame.loading = true;
 renderStoryboardGrid();
 progressBar.style.width = `${((i + 1) / 9) * 100}%`;
 await generateFrameImage(frame, frame.prompt, currentTheme);
 await new Promise(r => setTimeout(r, 500));
 }
 
 progressBar.style.width = '100%';
 setTimeout(() => progressBar.style.width = '0%', 1000);
 addMessageToChat(`✅ 9格分镜全部生成完成！点击任意格子可放大预览`, false);
 isGenerating = false;
}

async function exportAllFrames() {
 addMessageToChat(`📦 开始导出9张分镜图...`, false);
 for (let i = 0; i < storyboardFrames.length; i++) {
 const frame = storyboardFrames[i];
 if (frame.imageUrl) {
 const link = document.createElement('a');
 link.download = `storyboard_${i+1}_${currentTheme}.png`;
 link.href = frame.imageUrl;
 link.click();
 await new Promise(r => setTimeout(r, 300));
 }
 }
 addMessageToChat(`✅ 导出完成！`, false);
}

function clearStoryboard() {
 for (let i = 0; i < storyboardFrames.length; i++) {
 storyboardFrames[i].imageUrl = null;
 storyboardFrames[i].code = `<div style="text-align:center; padding:40px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:20px; color:white;">
 <div style="font-size:48px; margin-bottom:12px;">🎬</div>
 <p>${storyboardFrames[i].prompt}</p>
 </div>`;
 }
 renderStoryboardGrid();
 if (storyboardFrames[selectedIndex]) {
 document.getElementById('codeEditor').value = storyboardFrames[selectedIndex].code;
 updatePreview(storyboardFrames[selectedIndex].code);
 }
 addMessageToChat(`🗑️ 已清空所有分镜`, false);
}

// ========== OpenClaw AI Chat ==========
function addMessageToChat(content, isUser) {
 const container = document.getElementById('messages');
 const div = document.createElement('div');
 div.className = `message ${isUser ? 'user' : 'assistant'}`;
 div.innerHTML = content.replace(/\n/g, '<br>');
 container.appendChild(div);
 container.scrollTop = container.scrollHeight;
}

async function callOpenClawAI(userMessage) {
 const lowerMsg = userMessage.toLowerCase();
 
 // Theme switching
 if (lowerMsg.includes('日系') || lowerMsg.includes('anime')) {
 currentTheme = 'anime';
 document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
 document.querySelector('.theme-card[data-theme="anime"]')?.classList.add('active');
 return `🎨 已切换到主题: ${themeStyles.anime.name}\n\n你可以说"生成分镜"来创建9格画面，或直接告诉我你想要什么风格的角色。`;
 }
 if (lowerMsg.includes('赛博') || lowerMsg.includes('cyberpunk')) {
 currentTheme = 'cyberpunk';
 document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
 document.querySelector('.theme-card[data-theme="cyberpunk"]')?.classList.add('active');
 return `🤖 已切换到主题: ${themeStyles.cyberpunk.name}\n\n霓虹灯、未来城市，开始创作吧！`;
 }
 if (lowerMsg.includes('古风') || lowerMsg.includes('traditional')) {
 currentTheme = 'traditional';
 document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
 document.querySelector('.theme-card[data-theme="traditional"]')?.classList.add('active');
 return `🏯 已切换到主题: ${themeStyles.traditional.name}\n\n水墨丹青，古风雅韵，适合宫廷、武侠题材。`;
 }
 if (lowerMsg.includes('仙侠') || lowerMsg.includes('xianxia')) {
 currentTheme = 'xianxia';
 document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
 document.querySelector('.theme-card[data-theme="xianxia"]')?.classList.add('active');
 return `⚔️ 已切换到主题: ${themeStyles.xianxia.name}\n\n御剑飞行，修仙问道，适合修真、仙侠题材。`;
 }
 if (lowerMsg.includes('写实') || lowerMsg.includes('realistic')) {
 currentTheme = 'realistic';
 document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
 document.querySelector('.theme-card[data-theme="realistic"]')?.classList.add('active');
 return `📸 已切换到主题: ${themeStyles.realistic.name}\n\n照片级真实感，适合真人化作品。`;
 }
 
 // Generate storyboard
 if (lowerMsg.includes('生成') || lowerMsg.includes('创建') || lowerMsg.includes('制作')) {
 generateAllFrames();
 return `🎬 开始生成9格分镜，主题: ${themeStyles[currentTheme].name}，请稍候...\n\n生成完成后每个格子都会有一张精美的图片！`;
 }
 
 // Export
 if (lowerMsg.includes('导出') || lowerMsg.includes('下载')) {
 exportAllFrames();
 return `📦 开始导出9张分镜图，请查看下载文件夹~`;
 }
 
 // Clear
 if (lowerMsg.includes('清空') || lowerMsg.includes('重置')) {
 clearStoryboard();
 return `🗑️ 已清空所有分镜，可以重新生成了！`;
 }
 
 // Help
 return `✨ 我是 OpenClaw 分镜助手，你可以这样使用我：

🎨 **切换主题**：
- "日系动漫" / "赛博朋克"
- "古风传统" / "仙侠修真" / "真人写实"

🎬 **生成分镜**：
- "生成分镜" / "创建9格" / "制作分镜"

📦 **其他功能**：
- "导出图片" / "清空分镜"

🔘 **实时预览**：右侧开关已开启，编辑代码立即生效！

当前主题：${themeStyles[currentTheme].name}
实时预览：${liveEnabled ? '✅ 开启' : '⏸️ 关闭'}`;
}

async function sendMessage() {
 const input = document.getElementById('chatInput');
 const msg = input.value.trim();
 if (!msg) return;
 input.value = '';
 addMessageToChat(msg, true);
 
 // Show typing
 const typingDiv = document.createElement('div');
 typingDiv.className = 'message assistant';
 typingDiv.innerHTML = '<span style="opacity:0.7;">🤔 思考中...</span>';
 document.getElementById('messages').appendChild(typingDiv);
 
 try {
 const reply = await callOpenClawAI(msg);
 typingDiv.remove();
 addMessageToChat(reply, false);
 } catch (error) {
 typingDiv.remove();
 addMessageToChat(`⚠️ 出错了：${error.message}`, false);
 }
}

 if (storyboardFrames[selectedIndex]) {

// ========== Theme Switching ==========
function applyTheme(theme) {
 currentTheme = theme;
 document.querySelectorAll('.theme-card').forEach(card => {
 if (card.dataset.theme === theme) {
 card.classList.add('active');
 } else {
 card.classList.remove('active');
 }
 });
 addMessageToChat(`🎨 已切换到主题: ${themeStyles[theme].name}`, false);
}

// ========== Event Bindings ==========
document.getElementById('sendBtn')?.addEventListener('click', sendMessage);
document.getElementById('chatInput')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
document.getElementById('generateBtn')?.addEventListener('click', generateAllFrames);
document.getElementById('exportBtn')?.addEventListener('click', exportAllFrames);
document.getElementById('clearBtn')?.addEventListener('click', clearStoryboard);
document.getElementById('liveToggle')?.addEventListener('click', toggleLiveMode);

// Theme switching
document.querySelectorAll('.theme-card').forEach(card => {
 card.addEventListener('click', () => applyTheme(card.dataset.theme));
});

// Quick materials
document.querySelectorAll('[data-material]').forEach(btn => {
 btn.addEventListener('click', () => insertMaterial(btn.dataset.material));
});

// API switching
document.querySelectorAll('.api-btn').forEach(btn => {
 btn.addEventListener('click', () => {
 currentApi = btn.dataset.api;
 document.querySelectorAll('.api-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
 document.getElementById('customApiPanel').style.display = currentApi === 'custom' ? 'block' : 'none';
 });
});

document.getElementById('customApiUrl')?.addEventListener('change', (e) => { apiConfig.custom.url = e.target.value; });
document.getElementById('customApiKey')?.addEventListener('change', (e) => { apiConfig.custom.key = e.target.value; });

// ========== Initialize ==========
initStoryboard();
setupLivePreview();
document.querySelector('.theme-card[data-theme="anime"]')?.classList.add('active');

console.log('%c🎬 动漫分镜工坊完整版已启动 | OpenClaw对话 | 10大主题 | 9宫格分镜 | 实时预览', 'color: #a78bfa; font-size: 14px;');
</script>
