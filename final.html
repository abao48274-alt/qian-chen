<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
 <meta name="theme-color" content="#a78bfa">
 <meta name="apple-mobile-web-app-capable" content="yes">
 <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
 <link rel="manifest" href="manifest.json">
 <title>🎬 千尘AI动漫工厂 Ultimate</title>
 <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
 background: linear-gradient(135deg, #0f0c29, #1a1a2e, #16213e);
 min-height: 100vh;
 padding: 12px;
 color: #e2e8f0;
 }
 .app-container { max-width: 1600px; margin: 0 auto; }
 .dashboard {
 display: grid;
 grid-template-columns: 320px 1fr 340px;
 gap: 16px;
 margin-bottom: 16px;
 }
 @media (max-width: 1200px) { .dashboard { grid-template-columns: 1fr; } }
 
 .card {
 background: rgba(30, 30, 46, 0.9);
 backdrop-filter: blur(12px);
 border-radius: 24px;
 overflow: hidden;
 border: 1px solid rgba(255,255,255,0.1);
 margin-bottom: 12px;
 }
 .card-header {
 padding: 12px 16px;
 background: rgba(0,0,0,0.3);
 display: flex;
 justify-content: space-between;
 align-items: center;
 border-bottom: 1px solid rgba(255,255,255,0.1);
 }
 .card-header h3 { font-size: 0.85rem; color: white; display: flex; align-items: center; gap: 6px; }
 
 /* Live Preview Toggle */
 .live-preview-toggle {
 display: flex;
 align-items: center;
 gap: 8px;
 background: rgba(0,0,0,0.3);
 padding: 4px 12px;
 border-radius: 40px;
 }
 .toggle-switch {
 width: 40px;
 height: 20px;
 background: rgba(255,255,255,0.2);
 border-radius: 20px;
 cursor: pointer;
 transition: 0.3s;
 position: relative;
 }
 .toggle-switch.active { background: #a78bfa; }
 .toggle-switch::after {
 content: '';
 width: 16px;
 height: 16px;
 background: white;
 border-radius: 50%;
 position: absolute;
 top: 2px;
 left: 2px;
 transition: 0.3s;
 }
 .toggle-switch.active::after { left: 22px; }
 .status-badge {
 font-size: 0.6rem;
 padding: 2px 8px;
 border-radius: 20px;
 background: rgba(16,185,129,0.2);
 color: #10b981;
 }
 .status-badge.off { background: rgba(239,68,68,0.2); color: #ef4444; }
 
 /* 9 Grid Storyboard */
 .storyboard-container { padding: 16px; }
 .storyboard-grid {
 display: grid;
 grid-template-columns: repeat(3, 1fr);
 gap: 12px;
 margin-bottom: 16px;
 }
 .storyboard-cell {
 aspect-ratio: 16 / 9;
 background: rgba(0,0,0,0.5);
 border-radius: 12px;
 overflow: hidden;
 position: relative;
 cursor: pointer;
 border: 2px solid transparent;
 transition: 0.2s;
 }
 .storyboard-cell.active { border-color: #a78bfa; box-shadow: 0 0 20px rgba(167,139,250,0.5); }
 .storyboard-preview { width: 100%; height: 100%; object-fit: cover; }
 .storyboard-placeholder {
 width: 100%; height: 100%;
 display: flex;
 align-items: center;
 justify-content: center;
 background: linear-gradient(135deg, #2d2d44, #1a1a2e);
 color: #a78bfa;
 font-size: 0.7rem;
 }
 .storyboard-number {
 position: absolute;
 top: 6px; left: 8px;
 background: rgba(0,0,0,0.6);
 color: white;
 font-size: 0.7rem;
 padding: 2px 6px;
 border-radius: 12px;
 }
 .storyboard-label {
 position: absolute;
 bottom: 6px; left: 0; right: 0;
 text-align: center;
 background: rgba(0,0,0,0.6);
 color: white;
 font-size: 0.6rem;
 padding: 2px;
 }
 
 /* 10 Themes */
 .theme-grid-10 {
 display: grid;
 grid-template-columns: repeat(5, 1fr);
 gap: 8px;
 margin-bottom: 12px;
 }
 .theme-card {
 background: rgba(255,255,255,0.1);
 border-radius: 40px;
 padding: 8px 4px;
 text-align: center;
 cursor: pointer;
 font-size: 0.7rem;
 border: 1px solid transparent;
 transition: 0.2s;
 }
 .theme-card.active { background: #a78bfa; border-color: white; }
 .theme-card:hover { background: rgba(167,139,250,0.3); transform: translateY(-2px); }
 .theme-emoji { font-size: 1.2rem; display: block; }
 
 /* Preview Area */
 .main-preview { padding: 16px; }
 .main-preview-frame {
 background: white;
 border-radius: 20px;
 overflow: hidden;
 min-height: 400px;
 transition: 0.2s;
 }
 iframe { width: 100%; height: 450px; border: none; }
 
 /* Editor */
 .code-editor-container { position: relative; }
 textarea {
 width: 100%;
 height: 120px;
 background: #0a0a0f;
 color: #e2e8f0;
 font-family: monospace;
 padding: 12px;
 border: none;
 outline: none;
 font-size: 0.7rem;
 resize: vertical;
 }
 .live-indicator {
 position: absolute;
 bottom: 8px; right: 12px;
 font-size: 0.6rem;
 color: #10b981;
 background: rgba(16,185,129,0.2);
 padding: 2px 8px;
 border-radius: 20px;
 }
 
 .tool-btn {
 background: rgba(255,255,255,0.1);
 border: none;
 padding: 6px 12px;
 border-radius: 40px;
 color: white;
 font-size: 0.7rem;
 cursor: pointer;
 transition: 0.2s;
 }
 .tool-btn:hover { background: rgba(167,139,250,0.3); }
 .tool-btn.primary { background: #a78bfa; }
 .tool-btn.primary:hover { background: #9580d9; }
 
 .progress-bar {
 height: 2px;
 background: linear-gradient(90deg, #a78bfa, #7c3aed);
 width: 0%;
 transition: width 0.3s;
 margin-top: 8px;
 }
 
 .chat-area { height: 280px; display: flex; flex-direction: column; }
 .messages { flex: 1; overflow-y: auto; padding: 12px; }
 .message {
 margin-bottom: 8px;
 padding: 8px 12px;
 border-radius: 16px;
 max-width: 85%;
 font-size: 0.75rem;
 line-height: 1.4;
 }
 .message.user { background: #a78bfa; color: white; margin-left: auto; }
 .message.assistant { background: rgba(255,255,255,0.1); color: #e2e8f0; }
 
 .api-selector { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
 .api-btn {
 background: rgba(255,255,255,0.1);
 border: none;
 padding: 4px 10px;
 border-radius: 20px;
 font-size: 0.65rem;
 cursor: pointer;
 transition: 0.2s;
 }
 .api-btn:hover { background: rgba(167,139,250,0.3); }
 .api-btn.active { background: #a78bfa; }
 
 input[type="text"], input[type="password"] {
 background: rgba(255,255,255,0.1);
 border: 1px solid rgba(255,255,255,0.2);
 border-radius: 12px;
 padding: 8px 12px;
 color: white;
 font-size: 0.75rem;
 outline: none;
 }
 input:focus { border-color: #a78bfa; }
 </style>
</head>
<body>
<div class="app-container">
 <div class="dashboard">
 <!-- Left: AI Chat -->
 <div class="card">
 <div class="card-header"><h3>🤖 千尘 AI</h3><span style="font-size:0.65rem;color:#10b981">⚡ 在线</span></div>
 <div class="chat-area">
 <div class="messages" id="messages">
 <div class="message assistant">✨ 欢迎！实时预览已开启，编辑代码立即生效<br>🎬 10大主题：日系、赛博、古风、仙侠、写实...</div>
 </div>
 <div style="padding:12px; display:flex; gap:8px; border-top:1px solid rgba(255,255,255,0.1);">
 <input type="text" id="chatInput" style="flex:1;" placeholder="输入分镜描述...">
 <button class="tool-btn primary" id="sendBtn">发送</button>
 </div>
 </div>
 </div>
 
 <div class="card">
 <div class="card-header"><h3>🔌 生图API</h3></div>
 <div style="padding:12px;">
 <div class="api-selector" id="apiSelector">
 <button class="api-btn active" data-api="pollinations">🌐 Pollinations</button>
 <button class="api-btn" data-api="custom">⚙️ 自定义</button>
 </div>
 <div id="customApiPanel" style="display:none;">
 <input type="text" id="customApiUrl" style="width:100%; margin-bottom:6px;" placeholder="API地址">
 <input type="password" id="customApiKey" style="width:100%;" placeholder="API Key">
 </div>
 </div>
 </div>
 </div>
 
 <!-- Center: 9-Grid Storyboard -->
 <div class="card">
 <div class="card-header">
 <h3>🎬 9格分镜预览</h3>
 <div>
 <button class="tool-btn" id="generateBtn">🎨 生成9格</button>
 <button class="tool-btn" id="exportBtn">📦 导出</button>
 <button class="tool-btn" id="clearBtn">🗑️ 清空</button>
 </div>
 </div>
 <div class="storyboard-container">
 <div class="storyboard-grid" id="storyboardGrid"></div>
 <div class="theme-grid-10" id="themeGrid">
 <div class="theme-card" data-theme="anime"><span class="theme-emoji">🌸</span><span>日系动漫</span></div>
 <div class="theme-card" data-theme="cyberpunk"><span class="theme-emoji">🤖</span><span>赛博朋克</span></div>
 <div class="theme-card" data-theme="fantasy"><span class="theme-emoji">🐉</span><span>幻想奇幻</span></div>
 <div class="theme-card" data-theme="slice_of_life"><span class="theme-emoji">☕</span><span>日常治愈</span></div>
 <div class="theme-card" data-theme="action"><span class="theme-emoji">⚡</span><span>热血战斗</span></div>
 <div class="theme-card" data-theme="dark"><span class="theme-emoji">🌙</span><span>暗黑哥特</span></div>
 <div class="theme-card" data-theme="traditional"><span class="theme-emoji">🏯</span><span>古风传统</span></div>
 <div class="theme-card" data-theme="xianxia"><span class="theme-emoji">⚔️</span><span>仙侠修真</span></div>
 <div class="theme-card" data-theme="realistic"><span class="theme-emoji">📸</span><span>真人写实</span></div>
 <div class="theme-card" data-theme="watercolor"><span class="theme-emoji">🎨</span><span>水墨国风</span></div>
 </div>
 <div id="progressBar" class="progress-bar"></div>
 </div>
 </div>
 
 <!-- Right: Live Preview + Editor -->
 <div class="card">
 <div class="card-header">
 <h3>📷 实时预览</h3>
 <div class="live-preview-toggle">
 <span style="font-size:0.7rem;">实时预览</span>
 <div id="liveToggle" class="toggle-switch active"></div>
 <span id="liveStatus" class="status-badge">● 实时</span>
 </div>
 </div>
 <div class="main-preview">
 <div class="main-preview-frame" id="previewWrapper">
 <iframe id="previewFrame" sandbox="allow-same-origin allow-popups"></iframe>
 </div>
 </div>
 <div class="card-header"><h3>📝 代码编辑器</h3></div>
 <div class="code-editor-container">
 <textarea id="codeEditor" placeholder="编辑 HTML/CSS 代码，实时预览效果..."></textarea>
 <div class="live-indicator" id="liveIndicator">⚡ 实时模式已开启</div>
 </div>
 <div class="card-header"><h3>🎨 快速素材</h3></div>
 <div style="padding:12px; display:grid; grid-template-columns:repeat(4,1fr); gap:8px;" id="quickMaterials">
 <button class="tool-btn" data-material="dialog">💬 对话框</button>
 <button class="tool-btn" data-material="character">👤 角色卡</button>
 <button class="tool-btn" data-material="bg">🖼️ 背景</button>
 <button class="tool-btn" data-material="effect">✨ 特效</button>
 </div>
 </div>
 </div>
</div>

<script>
// ========== Live Preview Module v1.0 ==========
function initLivePreview(editorId, previewFrameId, onUpdateCallback) {
 let liveEnabled = true;
 let updateTimer = null;
 
 const editor = document.getElementById(editorId);
 const previewFrame = document.getElementById(previewFrameId);
 
 function updatePreview(code) {
 const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
 *{margin:0;padding:0;box-sizing:border-box;}
 body{background:linear-gradient(135deg,#f5f7fa,#e9eef5);min-height:450px;display:flex;align-items:center;justify-content:center;padding:20px;font-family:system-ui;}
 .preview-content{max-width:100%;animation:fadeIn 0.2s;}
 @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
 </style></head><body><div class="preview-content">${code || '<div style="padding:40px;">✨ 编辑代码实时预览 ✨</div>'}</div></body></html>`;
 previewFrame.srcdoc = doc;
 
 if (onUpdateCallback) onUpdateCallback(code);
 
 const wrapper = previewFrame.parentElement;
 if (wrapper && liveEnabled) {
 wrapper.style.transition = 'box-shadow 0.2s';
 wrapper.style.boxShadow = '0 0 0 2px #a78bfa';
 setTimeout(() => wrapper.style.boxShadow = '', 200);
 }
 }
 
 editor.addEventListener('input', (e) => {
 if (liveEnabled) {
 if (updateTimer) clearTimeout(updateTimer);
 updateTimer = setTimeout(() => {
 updatePreview(e.target.value);
 showLiveIndicator('⚡ 已实时更新');
 }, 100);
 }
 });
 
 function showLiveIndicator(msg) {
 const indicator = document.getElementById('liveIndicator');
 if (indicator) {
 const originalText = indicator.innerHTML;
 indicator.innerHTML = msg;
 setTimeout(() => indicator.innerHTML = originalText, 1500);
 }
 }
 
 function toggleLiveMode(enabled) {
 liveEnabled = enabled;
 if (enabled) {
 updatePreview(editor.value);
 showLiveIndicator('⚡ 实时模式已开启');
 } else {
 showLiveIndicator('⏸️ 手动模式');
 }
 return liveEnabled;
 }
 
 function refreshPreview() {
 updatePreview(editor.value);
 }
 
 updatePreview(editor.value);
 
 return { toggleLiveMode, refreshPreview, updatePreview };
}

// ========== Theme Definitions ==========
const themeStyles = {
 anime: { name: '日系动漫', prompt: 'anime style, vibrant colors, Japanese animation' },
 cyberpunk: { name: '赛博朋克', prompt: 'cyberpunk style, neon lights, futuristic city' },
 fantasy: { name: '幻想奇幻', prompt: 'fantasy art, magical, ethereal' },
 slice_of_life: { name: '日常治愈', prompt: 'slice of life, gentle colors, warm atmosphere' },
 action: { name: '热血战斗', prompt: 'action scene, dynamic, intense' },
 dark: { name: '暗黑哥特', prompt: 'dark gothic, mysterious, dramatic' },
 traditional: { name: '古风传统', prompt: 'traditional Chinese style, ink wash, elegant, classical beauty, silk and jade' },
 xianxia: { name: '仙侠修真', prompt: 'xianxia style, immortal cultivation, celestial mountains, flowing robes, sword magic' },
 realistic: { name: '真人写实', prompt: 'photorealistic, real human, detailed skin, natural lighting' },
 watercolor: { name: '水墨国风', prompt: 'watercolor painting, Chinese ink art, brush strokes, poetic' }
};

const defaultPrompts = [
 "主角登场，特写镜头，眼神坚定",
 "场景建立，广角镜头，壮丽世界",
 "关键对话，双人镜头，情感交流",
 "战斗场面，动态镜头，特效爆发",
 "转折时刻，悬念镜头，光影对比",
 "情感高潮，近景镜头，动人瞬间",
 "友情羁绊，并肩镜头，温暖氛围",
 "反派亮相，仰视镜头，压迫感强",
 "结局画面，全景镜头，希望之光"
];

let storyboardFrames = [];
let selectedIndex = 0;
let currentTheme = 'anime';
let currentApi = 'pollinations';
let apiConfig = { custom: { url: '', key: '' } };
let livePreview = null;

// Initialize
function init() {
 for (let i = 0; i < 9; i++) {
 storyboardFrames.push({
 id: i,
 prompt: defaultPrompts[i],
 imageUrl: null,
 code: `<div style="text-align:center; padding:40px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:20px; color:white;"><div style="font-size:48px;">🎬</div><p>${defaultPrompts[i]}</p></div>`
 });
 }
 renderGrid();
 selectFrame(0);
 
 // Initialize Live Preview Module
 livePreview = initLivePreview('codeEditor', 'previewFrame', (code) => {
 if (storyboardFrames[selectedIndex]) {
 storyboardFrames[selectedIndex].code = code;
 }
 });
}

function renderGrid() {
 const grid = document.getElementById('storyboardGrid');
 grid.innerHTML = storyboardFrames.map((f, i) => `
 <div class="storyboard-cell ${selectedIndex === i ? 'active' : ''}" onclick="selectFrame(${i})">
 <div class="storyboard-number">${i+1}</div>
 ${f.imageUrl ? `<img src="${f.imageUrl}" class="storyboard-preview">` : `<div class="storyboard-placeholder">🎬 分镜${i+1}</div>`}
 <div class="storyboard-label">${f.prompt.substring(0, 15)}</div>
 </div>
 `).join('');
 document.getElementById('selectedFrame').textContent = selectedIndex + 1;
 document.getElementById('generatedCount').textContent = storyboardFrames.filter(f => f.imageUrl).length;
}

window.selectFrame = (idx) => {
 selectedIndex = idx;
 renderGrid();
 document.getElementById('codeEditor').value = storyboardFrames[idx].code;
 if (livePreview) livePreview.updatePreview(storyboardFrames[idx].code);
};

// ========== Generate Images ==========
async function generateAll() {
 const bar = document.getElementById('progressBar');
 addMsg(`🎬 生成中，主题: ${themeStyles[currentTheme].name}...`, false);
 for (let i = 0; i < storyboardFrames.length; i++) {
 bar.style.width = `${((i+1)/9)*100}%`;
 const frame = storyboardFrames[i];
 const theme = themeStyles[currentTheme];
 const url = `https://image.pollinations.ai/prompt/${encodeURIComponent(frame.prompt + ', ' + theme.prompt + ', anime, high quality')}?width=512&height=512`;
 frame.imageUrl = url;
 frame.code = `<div style="text-align:center;"><img src="${url}" style="max-width:100%; border-radius:16px;"><p>${frame.prompt}</p><p style="font-size:12px;">${theme.name}</p></div>`;
 renderGrid();
 if (selectedIndex === i) {
 document.getElementById('codeEditor').value = frame.code;
 if (livePreview) livePreview.updatePreview(frame.code);
 }
 await new Promise(r => setTimeout(r, 300));
 }
 bar.style.width = '100%';
 setTimeout(() => bar.style.width = '0%', 1000);
 addMsg('✅ 9格分镜生成完成！', false);
}

async function exportAll() {
 for (let i = 0; i < storyboardFrames.length; i++) {
 if (storyboardFrames[i].imageUrl) {
 const link = document.createElement('a');
 link.download = `storyboard_${i+1}.png`;
 link.href = storyboardFrames[i].imageUrl;
 link.click();
 await new Promise(r => setTimeout(r, 200));
 }
 }
 addMsg('📦 导出完成！', false);
}

function clearAll() {
 for (let i = 0; i < storyboardFrames.length; i++) {
 storyboardFrames[i].imageUrl = null;
 storyboardFrames[i].code = `<div style="text-align:center; padding:40px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:20px; color:white;"><div style="font-size:48px;">🎬</div><p>${storyboardFrames[i].prompt}</p></div>`;
 }
 renderGrid();
 if (storyboardFrames[selectedIndex]) {
 document.getElementById('codeEditor').value = storyboardFrames[selectedIndex].code;
 if (livePreview) livePreview.updatePreview(storyboardFrames[selectedIndex].code);
 }
 addMsg('🗑️ 已清空', false);
}

// ========== Chat ==========
function addMsg(content, isUser) {
 const container = document.getElementById('messages');
 const div = document.createElement('div');
 div.className = `message ${isUser ? 'user' : 'assistant'}`;
 div.innerHTML = content;
 container.appendChild(div);
 container.scrollTop = container.scrollHeight;
}

async function sendMsg() {
 const input = document.getElementById('chatInput');
 const msg = input.value.trim();
 if (!msg) return;
 input.value = '';
 addMsg(msg, true);
 if (msg.includes('生成')) await generateAll();
 else if (msg.includes('清空')) clearAll();
 else if (msg.includes('导出')) exportAll();
 else addMsg(`✨ 收到！当前主题: ${themeStyles[currentTheme].name}`, false);
}

// ========== Insert Materials ==========
function insertMaterial(type) {
 const mats = {
 dialog: '<div style="background:rgba(255,255,240,0.95); border-radius:28px; padding:20px;"><p>✨ 台词</p><small>——角色</small></div>',
 character: '<div style="text-align:center;"><div style="width:80px;height:80px;background:#a78bfa;border-radius:50%;margin:0 auto;font-size:40px;">👤</div><h3>角色</h3></div>',
 bg: '<div style="background:linear-gradient(135deg,#667eea,#764ba2);padding:40px;border-radius:20px;text-align:center;color:white;"><h2>场景</h2></div>',
 effect: '<div style="animation:sparkle 1s infinite;text-align:center;">✨✨✨<style>@keyframes sparkle{0%,100%{opacity:0.5}50%{opacity:1}}</style></div>'
 };
 if (storyboardFrames[selectedIndex]) {
 const newCode = mats[type] + storyboardFrames[selectedIndex].code;
 storyboardFrames[selectedIndex].code = newCode;
 document.getElementById('codeEditor').value = newCode;
 if (livePreview) livePreview.updatePreview(newCode);
 }
}

// ========== Live Preview Toggle ==========
let liveEnabled = true;
document.getElementById('liveToggle')?.addEventListener('click', () => {
 liveEnabled = !liveEnabled;
 const toggle = document.getElementById('liveToggle');
 const status = document.getElementById('liveStatus');
 if (liveEnabled) {
 toggle.classList.add('active');
 status.innerHTML = '● 实时';
 status.className = 'status-badge';
 if (livePreview) livePreview.toggleLiveMode(true);
 } else {
 toggle.classList.remove('active');
 status.innerHTML = '○ 手动';
 status.className = 'status-badge off';
 if (livePreview) livePreview.toggleLiveMode(false);
 }
});

// ========== Event Bindings ==========
document.getElementById('sendBtn')?.addEventListener('click', sendMsg);
document.getElementById('chatInput')?.addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });
document.getElementById('generateBtn')?.addEventListener('click', generateAll);
document.getElementById('exportBtn')?.addEventListener('click', exportAll);
document.getElementById('clearBtn')?.addEventListener('click', clearAll);

document.querySelectorAll('.theme-card').forEach(card => {
 card.addEventListener('click', () => {
 document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
 card.classList.add('active');
 currentTheme = card.dataset.theme;
 addMsg(`🎨 已切换到: ${themeStyles[currentTheme].name}`, false);
 });
});

document.querySelectorAll('[data-material]').forEach(btn => {
 btn.addEventListener('click', () => insertMaterial(btn.dataset.material));
});

document.querySelectorAll('.api-btn').forEach(btn => {
 btn.addEventListener('click', () => {
 currentApi = btn.dataset.api;
 document.querySelectorAll('.api-btn').forEach(b => b.classList.remove('active'));
 btn.classList.add('active');
 document.getElementById('customApiPanel').style.display = currentApi === 'custom' ? 'block' : 'none';
 });
});

init();
console.log('%c🎬 动漫工厂 Ultimate v5.0 | 实时预览 + 10大主题 + 9宫格分镜', 'color:#a78bfa;font-size:14px;');
</script>
</body>
</html>
